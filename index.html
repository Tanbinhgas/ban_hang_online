<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GearHub - Cửa hàng Gear Máy Tính</title>
</head>
<body>

  <div class="container my-5 pt-5">
    <h1 class="text-center mb-4">Chào mừng đến GearHub</h1>
    <p class="lead text-center">Nơi quản lý và khám phá các gear gaming/PC hàng đầu 2025-2026</p>

    <div id="heroCarousel" class="carousel slide mb-5" data-bs-ride="carousel">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="https://via.placeholder.com/1200x500?text=Razer+Viper+V3+Pro" class="d-block w-100" alt="Razer Viper">
          <div class="carousel-caption d-none d-md-block">
            <h5>Razer Viper V3 Pro - Siêu nhẹ, siêu chính xác</h5>
          </div>
        </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
      </button>
    </div>

    <h3 class="text-center mb-4">Top Gear Hot</h3>
    <div class="row">
      <div class="col-md-4 mb-4">
        <div class="card h-100">
          <i class="fas fa-mouse-pointer fa-5x text-center mt-4 text-primary"></i>
          <div class="card-body text-center">
            <h5 class="card-title">Razer Viper V3 Pro</h5>
            <p class="card-text">Chuột không dây 54g, 35K DPI</p>
            <span class="badge bg-danger">Hot</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
